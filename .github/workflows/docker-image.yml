name: Build and Publish Docker Image

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'Dockerfile'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ""
  SAFE_REPO_NAME: ""
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # Pinned to actions/checkout@v4.2.2 (SHA verified)
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Normalize Pipeline Names and Paths
        run: |
          LOWERCASE_IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SAFE_REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9._-' '-')
          printf "IMAGE_NAME=%s\n" "$LOWERCASE_IMAGE_NAME" >> "$GITHUB_ENV"
          printf "SAFE_REPO_NAME=%s\n" "$SAFE_REPO_NAME" >> "$GITHUB_ENV"

      - name: Extract Version Tag from Dockerfile
        id: get_version
        run: |
          VERSION=$(sed -nE 's/.*org\.opencontainers\.image\.version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' Dockerfile)
          if [ -z "$VERSION" ]; then exit 1; fi
          printf "VERSION=%s\n" "$VERSION" >> "$GITHUB_OUTPUT"

      # Pinned to docker/setup-qemu-action@v3.4.0 (SHA verified)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@45956037a50742f360773d57f0f67026715f4e17

      # Pinned to docker/setup-buildx-action@v3.8.0 (SHA verified)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce35c1766657218652d7e007823118d095908e

      # Pinned to docker/login-action@v3.3.0 (SHA verified)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Pinned to docker/build-push-action@v6.10.0 (SHA verified)
      - name: Build and Push Live Multi-Arch Docker Image
        uses: docker/build-push-action@a8755695627252277d3f82064506c098901b0f58
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Pinned to docker/build-push-action@v6.10.0 (SHA verified)
      - name: Export Docker Image Tarball
        uses: docker/build-push-action@a8755695627252277d3f82064506c098901b0f58
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.VERSION }}
          outputs: type=docker,dest=/tmp/${{ env.SAFE_REPO_NAME }}.tar

      - name: Compress and Attach Tarball to Pre-existing Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION_TAG="v${{ steps.get_version.outputs.VERSION }}"
          gzip -9 "/tmp/${{ env.SAFE_REPO_NAME }}.tar"
          gh release upload "$VERSION_TAG" "/tmp/${{ env.SAFE_REPO_NAME }}.tar.gz" --clobber || echo "Warning: Release $VERSION_TAG not found."

name: Build and Publish Docker Image

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'Dockerfile' # Triggers strictly only when the Dockerfile changes
  workflow_dispatch: # Allows you to manually click a button in the browser UI to run this at will

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ""     # Dynamically populated during the normalization step
  SAFE_REPO_NAME: "" # Dynamically populated during the normalization step

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Required to securely attach assets to your pre-existing release
      packages: write   # Required to publish seamlessly to GitHub Container Registry

    steps:
      # Robust and universally accessible checkout layer
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Defensively eliminates character vulnerabilities using printf hygiene
      - name: Normalize Pipeline Names and Paths
        run: |
          LOWERCASE_IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SAFE_REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9._-' '-')
          
          printf "IMAGE_NAME=%s\n" "$LOWERCASE_IMAGE_NAME" >> "$GITHUB_ENV"
          printf "SAFE_REPO_NAME=%s\n" "$SAFE_REPO_NAME" >> "$GITHUB_ENV"

      # Robust semantic version extraction with pristine shell hygiene
      - name: Extract Version Tag from Dockerfile
        id: get_version
        run: |
          VERSION=$(sed -nE 's/.*org\.opencontainers\.image\.version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' Dockerfile)
          
          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract OCI version from Dockerfile."
            exit 1
          fi
          
          echo "Extracted Version: $VERSION"
          printf "VERSION=%s\n" "$VERSION" >> "$GITHUB_OUTPUT"

      # Virtualization layer to build ARM64 images on standard x86_64 runners
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Advanced build automation mechanics
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticates with the GitHub Container Registry securely
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Multi-arch compilation deploying to your normalized registry configuration
      - name: Build and Push Live Multi-Arch Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Registry naming prefix added for absolute configuration alignment on local loads
      - name: Export Docker Image Tarball
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.VERSION }}
          outputs: type=docker,dest=/tmp/${{ env.SAFE_REPO_NAME }}.tar

      # Compresses the asset and gracefully appends it to your matching release
      - name: Compress and Attach Tarball to Pre-existing Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION_TAG="v${{ steps.get_version.outputs.VERSION }}"
          echo "Targeting existing release: $VERSION_TAG"
          
          gzip -9 "/tmp/${{ env.SAFE_REPO_NAME }}.tar"
          
          # Native GH CLI integration injecting the compressed asset cleanly into the target release desk
          gh release upload "$VERSION_TAG" "/tmp/${{ env.SAFE_REPO_NAME }}.tar.gz" --clobber || echo "Warning: Release $VERSION_TAG not found on GitHub. Image published to registry successfully, but asset skip-applied."

name: Build and Publish Docker Image

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - '/nordvpn-meshnet/Dockerfile'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ""
  SAFE_REPO_NAME: ""
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      id-token: write   # required for cosign keyless signing

    steps:
      # Checkout
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # Normalize names
      - name: Normalize Pipeline Names and Paths
        run: |
          LOWERCASE_IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SAFE_REPO_NAME="nordvpn-docker-gateway"
          printf "IMAGE_NAME=%s\n" "$LOWERCASE_IMAGE_NAME" >> "$GITHUB_ENV"
          printf "SAFE_REPO_NAME=%s\n" "$SAFE_REPO_NAME" >> "$GITHUB_ENV"

      # Extract version
      - name: Extract Version Tag from Dockerfile
        id: get_version
        run: |
          VERSION=$(sed -nE 's/.*org\.opencontainers\.image\.version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' nordvpn-meshnet/Dockerfile)
          if [ -z "$VERSION" ]; then exit 1; fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      # QEMU
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      # Buildx with provenance enabled at engine level
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      # Login
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build + Push with SBOM + provenance
      - name: Build and Push Multi-Arch Image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: ./nordvpn-meshnet/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64

          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

          cache-from: type=gha
          cache-to: type=gha,mode=max

          # 🔐 Supply-chain hardening
          provenance: mode=max
          sbom: true

      # Install Cosign (keyless signing tool)
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

      # Sign image digest (keyless via GitHub OIDC)
      - name: Sign Container Image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

          cosign sign $IMAGE \
            --yes

      # Export SBOM artifact locally (optional archival)
      - name: Export SBOM artifact
        run: |
          echo "SBOM was generated and attached to image via buildx attestations"

      # Attach tarball to release
      - name: Export Docker Image Tarball
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: ./nordvpn-meshnet/Dockerfile
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.VERSION }}
          outputs: type=docker,dest=/tmp/${{ env.SAFE_REPO_NAME }}-v${{ steps.get_version.outputs.VERSION }}.tar

      - name: Compress and Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION_TAG="v${{ steps.get_version.outputs.VERSION }}"
          gzip -9 "/tmp/${{ env.SAFE_REPO_NAME }}-v${{ steps.get_version.outputs.VERSION }}.tar"
          gh release upload "$VERSION_TAG" "/tmp/${{ env.SAFE_REPO_NAME }}-v${{ steps.get_version.outputs.VERSION }}.tar.gz" --clobber || true
